<<!DOCTYPE html>
<html>

      <head>

                <meta charset="utf-8" />
                <title>Audio tone playing test</title>
                <meta name="viewport" content="width=device-width, initial-scale-1" />
                // Load Tone JS
                <script src="https://unpkg.com/tone"></script>
                <script>
                        function playNote(){
                              const synth = new Tone.Synth().toDestination();
                              synth.triggerAttackRelease("C4", "8n");
                        }
                </script>
      </head>
      <body> <h1>HTML Tone.js Demo</h1>
      <button onclick="playNote()">Click to play note!</button>
      </body>
</html>
